<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>context-bridge dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Reset & Base ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        background:
          radial-gradient(1200px 500px at 0% -10%, rgba(6, 182, 212, 0.2), transparent 60%),
          radial-gradient(900px 420px at 100% 0%, rgba(56, 189, 248, 0.16), transparent 58%),
          linear-gradient(180deg, #030712 0%, #0b1222 50%, #030712 100%);
        color: #e2e8f0;
        min-height: 100vh;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .grid-noise {
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.07) 1px, transparent 1px);
        background-size: 26px 26px;
        min-height: 100vh;
      }

      /* ── Layout ── */
      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }

      @media (min-width: 640px) { .container { padding: 2rem 1.5rem; } }
      @media (min-width: 1024px) { .container { padding: 2rem 2rem; } }

      /* ── Typography ── */
      .font-mono {
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, 'Cascadia Code', monospace;
      }

      .text-xs { font-size: 0.75rem; line-height: 1rem; }
      .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
      .text-2xl { font-size: 1.5rem; line-height: 2rem; }
      .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
      .font-bold { font-weight: 700; }
      .font-semibold { font-weight: 600; }
      .uppercase { text-transform: uppercase; }
      .tracking-wider { letter-spacing: 0.05em; }
      .tracking-tight { letter-spacing: -0.025em; }

      /* ── Colors ── */
      .text-slate-100 { color: #f1f5f9; }
      .text-slate-200 { color: #e2e8f0; }
      .text-slate-300 { color: #cbd5e1; }
      .text-slate-400 { color: #94a3b8; }
      .text-cyan-200 { color: #a5f3fc; }
      .text-cyan-300 { color: #67e8f9; }
      .text-emerald-300 { color: #6ee7b7; }
      .text-violet-300 { color: #c4b5fd; }

      /* ── Header ── */
      .header {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border-radius: 1rem;
        border: 1px solid rgba(34, 211, 238, 0.3);
        background: rgba(2, 6, 23, 0.75);
        padding: 1.25rem;
        margin-bottom: 2rem;
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.35), 0 20px 45px rgba(15, 23, 42, 0.55);
        backdrop-filter: blur(12px);
      }

      @media (min-width: 640px) {
        .header {
          flex-direction: row;
          align-items: center;
          justify-content: space-between;
        }
      }

      .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; color: #f1f5f9; }
      @media (min-width: 640px) { .header h1 { font-size: 1.875rem; } }
      .header .subtitle { margin-top: 0.25rem; font-size: 0.875rem; color: #cbd5e1; }

      .header-controls {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .time-badge {
        border-radius: 0.5rem;
        border: 1px solid #334155;
        background: rgba(15, 23, 42, 0.8);
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        color: #e2e8f0;
      }

      .time-badge .label { color: #94a3b8; }

      /* ── Buttons ── */
      .btn-refresh {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        border-radius: 0.5rem;
        border: 1px solid rgba(34, 211, 238, 0.6);
        background: rgba(6, 182, 212, 0.1);
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: #a5f3fc;
        cursor: pointer;
        transition: all 0.15s ease;
        font-family: inherit;
      }

      .btn-refresh:hover {
        background: rgba(34, 211, 238, 0.2);
        transform: translateY(-1px);
      }

      .btn-refresh:active { transform: translateY(0); }
      .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

      .refresh-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: #67e8f9;
        display: inline-block;
      }

      .refresh-dot.pulsing {
        animation: pulse 1s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      /* ── Status bar ── */
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.25rem;
      }

      /* ── Grid ── */
      .sessions-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr;
      }

      @media (min-width: 640px) { .sessions-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (min-width: 1280px) { .sessions-grid { grid-template-columns: repeat(3, 1fr); } }

      /* ── Cards ── */
      .card {
        border-radius: 0.75rem;
        border: 1px solid rgba(51, 65, 85, 0.8);
        background: rgba(15, 23, 42, 0.8);
        padding: 1rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        transition: all 0.2s ease;
        animation: rise 500ms ease-out both;
      }

      .card:hover {
        border-color: rgba(34, 211, 238, 0.4);
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.35), 0 20px 45px rgba(15, 23, 42, 0.55);
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.75rem;
      }

      .branch-name {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.875rem;
        font-weight: 600;
        color: #a5f3fc;
      }

      .time-tag {
        border-radius: 0.375rem;
        border: 1px solid #334155;
        background: #020617;
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
        color: #cbd5e1;
        white-space: nowrap;
      }

      .repo-name {
        font-size: 0.875rem;
        color: #cbd5e1;
        margin-bottom: 1rem;
      }

      .context-age {
        font-size: 0.75rem;
        color: #94a3b8;
        margin-bottom: 1rem;
      }

      /* ── Files ── */
      .files-section { margin-bottom: 1rem; }
      .section-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        margin-bottom: 0.5rem;
      }

      .files-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .file-tag {
        border-radius: 0.375rem;
        border: 1px solid #334155;
        background: #020617;
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
        font-family: 'JetBrains Mono', monospace;
        color: #e2e8f0;
      }

      /* ── Integration sections ── */
      .integration-box {
        border-radius: 0.5rem;
        border: 1px solid #334155;
        background: rgba(2, 6, 23, 0.7);
        padding: 0.75rem;
        margin-bottom: 1rem;
      }

      .integration-box:last-child { margin-bottom: 0; }

      .integration-box .label-github { color: #67e8f9; }
      .integration-box .label-linear { color: #6ee7b7; }
      .integration-box .label-slack { color: #c4b5fd; }

      .integration-box .content { font-size: 0.875rem; color: #e2e8f0; }
      .integration-box .meta { font-size: 0.75rem; color: #cbd5e1; margin-top: 0.25rem; }

      /* ── Empty state ── */
      .empty-state {
        grid-column: 1 / -1;
        border-radius: 0.75rem;
        border: 1px solid #334155;
        background: rgba(15, 23, 42, 0.7);
        padding: 2rem;
        text-align: center;
        color: #cbd5e1;
      }

      .slack-empty { font-size: 0.75rem; color: #94a3b8; }
      .slack-msg { font-size: 0.75rem; color: #cbd5e1; }
    </style>
  </head>

  <body>
    <div class="grid-noise">
      <main class="container">
        <section class="header">
          <div>
            <h1>context-bridge dashboard</h1>
            <p class="subtitle">Developer context timeline across branches</p>
          </div>

          <div class="header-controls">
            <div class="time-badge">
              <span class="label">Current time:</span>
              <span id="current-time" class="font-mono" style="margin-left: 0.5rem;"></span>
            </div>
            <button id="refresh-btn" class="btn-refresh">
              <span id="refresh-dot" class="refresh-dot"></span>
              Refresh
            </button>
          </div>
        </section>

        <section class="status-bar">
          <p id="session-count" class="text-sm text-slate-300"></p>
          <p id="status-msg" class="text-xs text-slate-400"></p>
        </section>

        <section id="sessions-grid" class="sessions-grid"></section>

        <template id="session-card-template">
          <article class="card">
            <div class="card-header">
              <h2 class="session-branch branch-name"></h2>
              <span class="session-last-active time-tag"></span>
            </div>

            <p class="session-repo repo-name"></p>

            <p class="session-context-age context-age"></p>

            <div class="files-section">
              <p class="section-label">Files touched</p>
              <div class="session-files files-wrap"></div>
            </div>

            <div class="integration-box">
              <p class="section-label label-github">GitHub</p>
              <p class="session-pr content"></p>
              <p class="session-comments meta"></p>
              <p class="session-ci meta"></p>
            </div>

            <div class="integration-box">
              <p class="section-label label-linear">Linear</p>
              <p class="session-ticket content"></p>
              <p class="session-linear-meta meta"></p>
            </div>

            <div class="integration-box">
              <p class="section-label label-slack">Slack</p>
              <div class="session-slack"></div>
            </div>
          </article>
        </template>
      </main>
    </div>

    <script>
      const sessionsGrid = document.getElementById("sessions-grid");
      const sessionCount = document.getElementById("session-count");
      const statusMsg = document.getElementById("status-msg");
      const timeNode = document.getElementById("current-time");
      const refreshBtn = document.getElementById("refresh-btn");
      const refreshDot = document.getElementById("refresh-dot");
      const template = document.getElementById("session-card-template");

      const SESSIONS_POLL_MS = 30000;
      const CONTEXT_POLL_MS = 120000;
      const REFRESH_THROTTLE_MS = 10000;
      let lastManualRefreshMs = 0;

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatRelativeTime(isoValue) {
        if (!isoValue) return "Unknown";
        const then = new Date(isoValue);
        if (Number.isNaN(then.getTime())) return "Unknown";

        const now = new Date();
        const diffMs = Math.max(0, now - then);
        const diffMin = Math.floor(diffMs / 60000);
        const diffHr = Math.floor(diffMin / 60);
        const diffDay = Math.floor(diffHr / 24);

        if (diffMin < 1) return "Just now";
        if (diffMin < 60) return `${diffMin} min ago`;
        if (diffHr < 24) return `${diffHr} hour${diffHr > 1 ? "s" : ""} ago`;
        return `${diffDay} day${diffDay > 1 ? "s" : ""} ago`;
      }

      function setCurrentTime() {
        const now = new Date();
        timeNode.textContent = now.toLocaleString();
      }

      function setContextAge(card, session) {
        const node = card.querySelector(".session-context-age");
        const meta = session.context_meta || {};
        const labels = [];

        for (const key of ["github", "linear", "slack"]) {
          const value = meta[key];
          if (value && typeof value.age_minutes === "number") {
            const age = Math.round(value.age_minutes);
            labels.push(`${key}: ${age}m`);
          }
        }

        if (labels.length === 0) {
          node.textContent = "No cached integration context yet";
        } else {
          node.textContent = `Cache age → ${labels.join(" | ")}`;
        }
      }

      function renderGithub(card, session) {
        const github = session.github || {};
        const pr = github.pr || {};
        const ci = github.ci || {};

        const prNode = card.querySelector(".session-pr");
        const commentsNode = card.querySelector(".session-comments");
        const ciNode = card.querySelector(".session-ci");

        if (pr.number) {
          prNode.textContent = `PR #${pr.number}: ${pr.title || "Untitled PR"}`;
        } else if (pr.title) {
          prNode.textContent = pr.title;
        } else {
          prNode.textContent = "No open PR for this branch";
        }

        const comments = Array.isArray(pr.comments) ? pr.comments.length : 0;
        commentsNode.textContent = `Unresolved comments: ${comments}`;

        const status = ci.status || "unknown";
        const conclusion = ci.conclusion || "unknown";
        if (status === "failure" && ci.failed_job) {
          ciNode.textContent = `CI: failure (${ci.failed_job})`;
        } else {
          ciNode.textContent = `CI: ${status} (${conclusion})`;
        }
      }

      function renderLinear(card, session) {
        const linear = session.linear || {};
        const ticketNode = card.querySelector(".session-ticket");
        const metaNode = card.querySelector(".session-linear-meta");

        if (linear.ticket_id) {
          ticketNode.textContent = `${linear.ticket_id}: ${linear.title || "Untitled"}`;
          metaNode.textContent = `${linear.status || "Unknown"} | ${linear.assignee || "Unassigned"} | ${linear.priority || "Unknown"}`;
        } else {
          ticketNode.textContent = linear.title || "No ticket ID in branch name";
          metaNode.textContent = "Linear context unavailable for this branch";
        }
      }

      function renderSlack(card, session) {
        const slack = session.slack || {};
        const wrap = card.querySelector(".session-slack");
        wrap.innerHTML = "";

        const messages = Array.isArray(slack.messages) ? slack.messages : [];
        if (messages.length === 0) {
          const empty = document.createElement("p");
          empty.className = "slack-empty";
          empty.textContent = "No recent matching Slack messages";
          wrap.appendChild(empty);
          return;
        }

        for (const msg of messages.slice(0, 2)) {
          const line = document.createElement("p");
          line.className = "slack-msg";
          const author = msg.author || "Unknown";
          const channel = msg.channel || "unknown";
          const text = msg.text || "";
          line.textContent = `${author} in #${channel}: ${text}`;
          wrap.appendChild(line);
        }
      }

      function renderSessions(sessions) {
        sessionsGrid.innerHTML = "";

        if (!Array.isArray(sessions) || sessions.length === 0) {
          sessionsGrid.innerHTML = `
            <div class="empty-state">
              No sessions yet. Run <strong>cb status</strong> from your repository to populate context.
            </div>
          `;
          sessionCount.textContent = "0 sessions";
          return;
        }

        sessionCount.textContent = `${sessions.length} session${sessions.length > 1 ? "s" : ""}`;

        for (const session of sessions) {
          const card = template.content.firstElementChild.cloneNode(true);

          card.querySelector(".session-branch").textContent = session.branch_name || "unknown-branch";
          card.querySelector(".session-repo").textContent = session.repo || "unknown/repo";
          card.querySelector(".session-last-active").textContent = formatRelativeTime(session.last_active);

          const filesWrap = card.querySelector(".session-files");
          const files = Array.isArray(session.files_touched) ? session.files_touched : [];

          if (files.length === 0) {
            filesWrap.innerHTML = '<span class="file-tag" style="color:#94a3b8;">No files</span>';
          } else {
            for (const file of files) {
              const tag = document.createElement("span");
              tag.className = "file-tag";
              tag.textContent = file;
              filesWrap.appendChild(tag);
            }
          }

          setContextAge(card, session);
          renderGithub(card, session);
          renderLinear(card, session);
          renderSlack(card, session);

          sessionsGrid.appendChild(card);
        }
      }

      async function loadSessions() {
        try {
          const response = await fetch("/api/sessions", { cache: "no-store" });
          const data = await response.json();
          if (!data.ok) {
            statusMsg.textContent = "Could not load sessions";
            return;
          }
          renderSessions(data.sessions || []);
          statusMsg.textContent = `Updated ${new Date().toLocaleTimeString()}`;
        } catch (_err) {
          statusMsg.textContent = "Network issue while loading sessions";
        }
      }

      async function refreshStatus(options = {}) {
        const isAuto = Boolean(options.isAuto);

        if (!isAuto) {
          const now = Date.now();
          if (now - lastManualRefreshMs < REFRESH_THROTTLE_MS) {
            statusMsg.textContent = "Please wait a few seconds before refreshing again";
            return;
          }
          lastManualRefreshMs = now;
        }

        refreshBtn.disabled = true;
        refreshDot.classList.add("pulsing");
        statusMsg.textContent = isAuto ? "Auto-refreshing live context..." : "Refreshing context...";

        try {
          const response = await fetch("/api/status", { cache: "no-store" });
          if (response.status === 429) {
            statusMsg.textContent = "Rate limited by upstream API. Retrying on next cycle.";
            return;
          }

          const payload = await response.json();
          if (payload.ok) {
            const warnings = [payload.github_error, payload.linear_error, payload.slack_error].filter(Boolean);
            if (warnings.length > 0) {
              statusMsg.textContent = `Context refreshed with ${warnings.length} warning(s) at ${new Date().toLocaleTimeString()}`;
            } else {
              statusMsg.textContent = `Context refreshed at ${new Date().toLocaleTimeString()}`;
            }
          } else {
            statusMsg.textContent = `Refresh failed: ${escapeHtml(payload.error || "unknown error")}`;
          }
        } catch (_err) {
          statusMsg.textContent = "Refresh request failed";
        } finally {
          refreshBtn.disabled = false;
          refreshDot.classList.remove("pulsing");
          await loadSessions();
        }
      }

      refreshBtn.addEventListener("click", refreshStatus);

      setCurrentTime();
      loadSessions();
      refreshStatus({ isAuto: true });

      setInterval(setCurrentTime, 1000);
      setInterval(loadSessions, SESSIONS_POLL_MS);
      setInterval(() => refreshStatus({ isAuto: true }), CONTEXT_POLL_MS);
    </script>
  </body>
</html>
